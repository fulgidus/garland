title: Garland
description: Alessio's personal cognitive base — beliefs, sources, skills.

theme: just-the-docs
color_scheme: dark

plugins:
  - jekyll-wikilinks
  - jekyll-feed
  - jekyll-seo-tag

# jekyll-wikilinks config
wikilinks:
  exclude:
    - types: []
  d3_graph_data:
    enabled: false

exclude:
  - raw/
  - skills/
  - SPEC.md
  - AGENTS.md
  - Gemfile
  - Gemfile.lock
  - "*.tar.gz"
